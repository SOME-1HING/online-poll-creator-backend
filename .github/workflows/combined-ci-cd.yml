name: Combined CI/CD Workflow

on:
  push:
    branches: [main]

jobs:
  test-job:
    runs-on: ubuntu-latest
    env:
      MONGODB_URI: ${{ secrets.MONGODB_URI }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v2 # Pull code to ubuntu

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm test

  deploy-job:
    runs-on: ubuntu-latest
    needs: test-job # Ensure tests run before deployment
    if: ${{ needs.test-job.result == 'success' }} # Only run if tests passed

    steps:
      - name: Checkout Code
        uses: actions/checkout@v2 # Pull code to ubuntu

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel --prod --yes --token $VERCEL_TOKEN
